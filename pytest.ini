[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

markers =
    training: 训练相关测试
    checkpoint: 检查点保存/加载测试
    performance: 性能监控测试
    integration: 集成测试
    slow: 慢速测试（可能需要较长时间）
    hardware: 需要硬件设备的测试
    simulation: 需要仿真环境的测试
    gpu: 需要GPU的测试
    order: pytest-ordering插件提供的测试顺序标记