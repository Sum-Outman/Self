[tool:pytest]
# 测试配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings
    --cov=.
    --cov-report=html
    --cov-report=term-missing

# 测试标记
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试
    fast: 快速测试
    requires_gpu: 需要GPU
    requires_internet: 需要网络连接
    requires_database: 需要数据库
    requires_hardware: 需要硬件设备